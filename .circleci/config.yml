version: 2.1

orbs:
  node: circleci/node@5.2.0

jobs:

  block-dev-to-main:
    docker:
      - image: cimg/base:stable
    steps:
      - run:
          name: Block Dev to Main
          command: |
            PR_NUMBER=$(echo $CIRCLE_PULL_REQUEST | grep -o '[0-9]*$')

            echo "PR Number: $PR_NUMBER"

            if [ -z "$PR_NUMBER" ]; then
              echo "Pas de PR détectée, skip"
              exit 0
            fi

            PR_DATA=$(curl -s \
              -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/repos/$CIRCLE_PROJECT_USERNAME/$CIRCLE_PROJECT_REPONAME/pulls?head=$CIRCLE_PROJECT_USERNAME:$CIRCLE_BRANCH&state=open")

            SOURCE_BRANCH=$(echo "$PR_DATA" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0]['head']['ref']) if d else print('')")
            TARGET_BRANCH=$(echo "$PR_DATA" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0]['base']['ref']) if d else print('')")

            echo "Source branch: $SOURCE_BRANCH"
            echo "Target branch: $TARGET_BRANCH"

            # Règles vers main : seulement release/* et hotfix/*
            if [ "$TARGET_BRANCH" = "main" ]; then
              if ! echo "$SOURCE_BRANCH" | grep -qE '^(release|hotfix)/'; then
                echo "Seules les branches release/* et hotfix/* peuvent etre merge dans main !"
                exit 1
              fi
            fi

            # Règles vers integration : seulement develop et hotfix/*
            if [ "$TARGET_BRANCH" = "integration" ]; then
              if [ "$SOURCE_BRANCH" != "develop" ] && ! echo "$SOURCE_BRANCH" | grep -qE '^hotfix/'; then
                echo "Seules develop et hotfix/* peuvent etre merge dans integration !"
                exit 1
              fi
            fi

            echo "OK"

  test-api:
    docker:
      - image: cimg/node:22.12
    working_directory: ~/repo
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: npm install
      - run:
          name: Build API
          command: npx turbo run build --filter=@student-life/api
      - run:
          name: Tests API
          command: npx turbo run test --filter=@student-life/api

  test-web:
    docker:
      - image: cimg/node:22.12
    working_directory: ~/repo
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: npm install
      - run:
          name: Build Web
          command: npx turbo run build --filter=@student-life/web
      - run:
          name: Tests Web
          command: npx turbo run test --filter=@student-life/web

  test-mobile:
    docker:
      - image: cimg/node:22.12
    working_directory: ~/repo
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: npm install
      - run:
          name: Tests Mobile
          command: npx turbo run test --filter=@student-life/mobile

workflows:
  ci:
    jobs:
      - block-dev-to-main
      - test-api
      - test-web
      - test-mobile