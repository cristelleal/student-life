services:
  postgres:
    image: postgres:16-alpine
    container_name: studentlife-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: studentlife
      POSTGRES_PASSWORD: studentlife
      POSTGRES_DB: studentlife
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studentlife -d studentlife"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit
    container_name: studentlife-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    volumes:
      - mailpit_data:/data
    environment:
      MP_DATABASE: /data/mailpit.db
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

volumes:
  postgres_data:
  mailpit_data:
